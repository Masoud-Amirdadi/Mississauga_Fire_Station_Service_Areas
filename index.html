<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Mississauga Fire Service Areas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />

    <!-- Site CSS -->
    <link rel="stylesheet" href="./css/styles.css" />

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .legend {
            background: #fff;
            padding: 8px;
            font-size: 13px;
            line-height: 1.4;
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }

        .legend-header {
            user-select: none;
        }

        .stn-label {
            white-space: nowrap;
            transform: translateY(-8px);
        }

        .chart-panel {
            position: absolute;
            right: 10px;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            z-index: 9999;
            display: none;
            box-sizing: border-box;
        }

        #rt-chart-container {
            top: 10px;
            width: 360px;
            height: 230px;
        }

        #station-rt-chart-container {
            top: 250px;
            width: 520px;
            height: 320px;
        }

        #rtChart,
        #stationRtChart {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>
</head>

<body>
    <!-- Map container -->
    <div id="map"></div>

    <!-- Overall response-time chart -->
    <div id="rt-chart-container" class="chart-panel">
        <canvas id="rtChart"></canvas>
    </div>

    <!-- Per-station model chart -->
    <div id="station-rt-chart-container" class="chart-panel">
        <canvas id="stationRtChart"></canvas>
    </div>

    <!-- JS libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Main app script -->
    <script src="app.bundle.js"></script>

    <noscript>This map requires JavaScript. Please enable JavaScript in your browser.</noscript>
</body>
</html>
